name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledgr
          POSTGRES_PASSWORD: ledgr_dev_password
          POSTGRES_DB: ledgr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledgr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: Ledgr
      APP_VERSION: 0.1.0
      DATABASE_URL: postgresql+asyncpg://ledgr:ledgr_dev_password@localhost:5432/ledgr
      LOG_LEVEL: INFO
      JWT_SECRET_KEY: ci-secret-key
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
