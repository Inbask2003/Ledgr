services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgr-postgres
    environment:
      POSTGRES_USER: ledgr
      POSTGRES_PASSWORD: ledgr_dev_password
      POSTGRES_DB: ledgr
    ports:
      - "5433:5432"
    volumes:
      - ledgr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgr -d ledgr"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ledgr-backend
    environment:
      APP_NAME: Ledgr
      APP_VERSION: 0.1.0
      DATABASE_URL: postgresql+asyncpg://ledgr:ledgr_dev_password@postgres:5432/ledgr
      LOG_LEVEL: INFO
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      CORS_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: ledgr-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ledgr_postgres_data:
