services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgr-postgres
    environment:
      POSTGRES_USER: ledgr
      POSTGRES_PASSWORD: ledgr_dev_password
      POSTGRES_DB: ledgr
    ports:
      - "5433:5432"
    volumes:
      - ledgr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgr -d ledgr"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ledgr_postgres_data:
